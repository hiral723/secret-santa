<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secret Santa 🎅</title>
  <link rel="stylesheet" href="style.css" />

  <!-- paste into index.html, replace your existing firebase init <script type="module"> -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
    import { getDatabase, ref, set, get, update, onValue } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-database.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyA-TZDskE4-Y31h0NKa7v65IRyjAY7thBI",
      authDomain: "secret-santa-375f5.firebaseapp.com",
      databaseURL: "https://secret-santa-375f5-default-rtdb.firebaseio.com",
      projectId: "secret-santa-375f5",
      storageBucket: "secret-santa-375f5.appspot.com",
      messagingSenderId: "379151648489",
      appId: "1:379151648489:web:05a4425ae857ad5d431278"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const auth = getAuth(app);

    // auto sign-in anonymously
    signInAnonymously(auth).catch(e => {
      console.error('Anonymous sign-in failed', e);
    });

    // expose to window for your current script to use
    window.db = db;
    window.ref = ref;
    window.set = set;
    window.get = get;
    window.update = update;
    window.onValue = onValue;
    window.auth = auth;
    window.onAuthStateChanged = onAuthStateChanged;

    console.log('Firebase init done. DB and Auth available:', !!window.db, !!window.auth);
  </script>
</head>

<body>
  <div class="overlay">
    <div class="card">
      <h1>🎄 Secret Santa 🎄</h1>

      <div id="main-menu">
        <button onclick="createRoom()">Create Room</button>
        <div class="join-section">
          <input id="roomCodeInput" placeholder="Enter Room Code" />
          <button onclick="joinRoom()">Join Room</button>
        </div>
      </div>

      <div id="room-section" class="hidden">
        <h2>Room Code: <span id="roomCode"></span></h2>
        <p id="message"></p>

        <div class="join-area">
          <input id="nameInput" placeholder="Enter your name" />
          <button onclick="addParticipant()">Join</button>
        </div>

        <button id="assignBtn" class="hidden" onclick="assignGifts()">Assign Gifts</button>
        <button onclick="revealGift()">Reveal My Gift</button>
        <p id="giftResult"></p>
      </div>
    </div>
  </div>

  <!-- IMPORTANT: load your app script as a non-module so its functions are global for inline onclick -->
  <script src="script.js" defer></script>
</body>
</html>
